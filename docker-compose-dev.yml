services:

  db:
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
  
  redis:
    ports:
      - "${REDIS_PORT}:6379"

  images:
    image: minio/minio
    ports:
      - "${IMAGES_PORT}:9000"
      - "${IMAGES_EDITOR_PORT}:9001" 
    environment:
      MINIO_ROOT_USER: ${IMAGES_USER}
      MINIO_ROOT_PASSWORD: ${IMAGES_PASSWORD}

    command: server /data --console-address ":9001"

    
