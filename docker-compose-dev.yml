services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
  
  redis:
    image: redis/redis-stack
    container_name: redis_cache
    ports:
      - "${REDIS_PORT}:6379"
      - "${REDIS_GUI_PORT}:8001"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"

