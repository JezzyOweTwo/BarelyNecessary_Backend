secrets:
  DB_USER:
    file: secrets/DB_USER.txt
  DB_PASSWORD:
    file: secrets/DB_PASSWORD.txt
  DB_NAME:
    file: secrets/DB_NAME.txt
  JWT_SECRET:
    file: secrets/JWT_SECRET.txt
  GMAIL_EMAIL:
    file: secrets/GMAIL_EMAIL.txt
  SENDGRIND_API_KEY:
    file: secrets/SENDGRIND_API_KEY.txt
  STRIPE_SECRET_KEY:
    file: secrets/STRIPE_SECRET_KEY.txt
  STRIPE_WEBHOOK_SECRET:
    file: secrets/STRIPE_WEBHOOK_SECRET.txt
  REDIS_USER:
    file: secrets/REDIS_USER.txt
  REDIS_PASSWORD:
    file: secrets/REDIS_PASSWORD.txt
  AWS_ACCESS_KEY_ID:
    file: secrets/AWS_ACCESS_KEY_ID.txt
  AWS_SECRET_ACCESS_KEY:
    file: secrets/AWS_SECRET_ACCESS_KEY.txt
  