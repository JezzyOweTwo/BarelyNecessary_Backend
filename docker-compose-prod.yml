services:
  app:
    ports:
      - "${APP_PORT}:${APP_PORT}"
    build:
      dockerfile: Dockerfile.prod
    env_file: 
      - .env.production
    secrets:
      - DB_USER
      - DB_PASSWORD
      - DB_NAME

secrets:
  DB_USER:
    file: ./secrets/db_username.txt
  DB_PASSWORD:
    file: ./secrets/db_password.txt
  DB_NAME:
    file: ./secrets/db_name.txt